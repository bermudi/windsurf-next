name: Check for Updates

on:
  schedule:
    # Run every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.check.outputs.has_update }}
      new_version: ${{ steps.check.outputs.new_version }}
      sha256: ${{ steps.check.outputs.sha256 }}
      filename: ${{ steps.check.outputs.filename }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Fetch latest version from APT repo
        id: latest
        run: |
          APT_BASE="https://windsurf-stable.codeiumdata.com/mQfcApCOdSLoWOSI/apt"
          PACKAGES_URL="$APT_BASE/dists/next/main/binary-amd64/Packages"
          
          packages_content=$(curl -sL "$PACKAGES_URL")
          
          # Parse devin-desktop-next stanza in a single pass to ensure field consistency.
          # The repo has two packages: devin-desktop-next (real) and windsurf-next (transitional stub).
          read -r apt_version sha256 filename < <(echo "$packages_content" | awk '
            /^Package: devin-desktop-next$/ { p=1; v=""; s=""; f="" }
            p && /^Version:/  { v=$2 }
            p && /^SHA256:/   { s=$2 }
            p && /^Filename:/ { f=$2 }
            p && /^$/ { if (v && s && f) { print v, s, f; exit }; p=0 }
          ')
          
          if [[ -z "$apt_version" || -z "$sha256" || -z "$filename" ]]; then
            echo "ERROR: Failed to parse Packages file"
            echo "$packages_content"
            exit 1
          fi
          
          # Convert to Arch version format
          # APT: 3.0.1017+next.2fb9b4e7df-1780460106
          # Arch: 3.0.1017_next.2fb9b4e7df
          # First hyphen is always the Debian revision separator (upstream versions never contain -)
          arch_version=$(echo "$apt_version" | sed 's/+/_/g; s/-.*//')
          
          echo "apt_version=$apt_version"
          echo "arch_version=$arch_version"
          echo "sha256=$sha256"
          echo "filename=$filename"
          
          echo "arch_version=$arch_version" >> $GITHUB_OUTPUT
          echo "sha256=$sha256" >> $GITHUB_OUTPUT
          echo "filename=$filename" >> $GITHUB_OUTPUT
      
      - name: Fetch current version from AUR
        id: aur
        env:
          AUR_REPO: https://aur.archlinux.org/windsurf-next.git
        run: |
          git clone --depth 1 "$AUR_REPO" aur-current
          aur_version=$(grep "^pkgver=" aur-current/PKGBUILD | cut -d'=' -f2)
          echo "version=$aur_version" >> $GITHUB_OUTPUT
      
      - name: Compare versions
        id: check
        run: |
          current="${{ steps.aur.outputs.version }}"
          latest="${{ steps.latest.outputs.arch_version }}"
          
          echo "Current version: $current"
          echo "Latest version: $latest"
          
          if [[ "$current" != "$latest" ]]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "new_version=$latest" >> $GITHUB_OUTPUT
            echo "sha256=${{ steps.latest.outputs.sha256 }}" >> $GITHUB_OUTPUT
            echo "filename=${{ steps.latest.outputs.filename }}" >> $GITHUB_OUTPUT
            echo "Update available: $current -> $latest"
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "No update available"
          fi
  
  update:
    needs: check
    if: needs.check.outputs.has_update == 'true'
    uses: ./.github/workflows/update-pkgbuild.yml
    with:
      version: ${{ needs.check.outputs.new_version }}
      sha256: ${{ needs.check.outputs.sha256 }}
      filename: ${{ needs.check.outputs.filename }}
    secrets: inherit
